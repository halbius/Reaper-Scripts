<!doctype html>
<html>
<head>
  <title>PDF PageTurner v2</title>
  <meta charset="utf-8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;600&display=swap" rel="stylesheet">

  <!-- PDF.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      --bg:         #1a1c1e;
      --panel:      #22252a;
      --border:     #2e3238;
      --accent:     #00e5a0;
      --accent2:    #ff6b35;
      --muted:      #5a6070;
      --text:       #c8ccd4;
      --text-dim:   #7a8090;
      --highlight:  rgba(0, 229, 160, 0.35);
      --canvas-bg:  #111214;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      font-weight: 300;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOP BAR ─────────────────────────────────────────── */
    #topbar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 20px;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    #topbar .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--accent);
      letter-spacing: 0.1em;
      white-space: nowrap;
    }

    .separator {
      width: 1px;
      height: 28px;
      background: var(--border);
      flex-shrink: 0;
    }

    /* transport */
    #transport-display {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      color: var(--text-dim);
      white-space: nowrap;
    }
    #transport-display .state          { color: var(--accent2); transition: color .2s; }
    #transport-display .state.playing  { color: #00e57a; text-shadow: 0 0 8px rgba(0,229,122,.5); }
    #transport-display .state.paused   { color: #ffaa00; }
    #transport-display .state.rec      { color: #ff3333; }
    #transport-display .time           { color: var(--text); margin-left: 6px; }

    /* mode toggles */
    .mode-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .mode-label { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: .08em; }

    .toggle-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      user-select: none;
      transition: border-color .2s;
    }
    .toggle-pill:hover { border-color: var(--muted); }
    .toggle-pill input[type="checkbox"] { display: none; }
    .toggle-pill .pill-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
      transition: background .2s;
      flex-shrink: 0;
    }
    .toggle-pill.active .pill-dot { background: var(--accent); }
    .toggle-pill.active { border-color: var(--accent); }
    .toggle-pill .pill-text { font-size: 12px; font-weight: 400; }

    /* editable params */
    .param-field {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
    }
    .param-field label { color: var(--text-dim); text-transform: uppercase; letter-spacing: .08em; }
    .param-field .val {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      cursor: pointer;
      border-bottom: 1px dashed var(--muted);
      padding: 0 2px;
      min-width: 28px;
    }
    .param-field .val:hover { color: #fff; }

    /* file input */
    #inputPDF {
      font-size: 11px;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
    }
    #inputPDF::-webkit-file-upload-button {
      background: var(--border);
      border: none;
      color: var(--text);
      padding: 3px 8px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
    }

    /* status strip */
    #statusbar {
      background: #161819;
      border-bottom: 1px solid var(--border);
      padding: 4px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 11px;
      color: var(--text-dim);
      flex-shrink: 0;
      font-family: 'Share Tech Mono', monospace;
      flex-wrap: wrap;
    }
    #statusbar .badge {
      padding: 1px 8px;
      border-radius: 3px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
    }
    .badge-marker   { background: rgba(0,229,160,.15); color: var(--accent); }
    .badge-item     { background: rgba(255,107,53,.15); color: var(--accent2); }
    .badge-inactive { background: rgba(90,96,112,.1);  color: var(--muted); }
    #status-msg     { color: var(--text); }
    #match-count    { color: var(--accent2); }

    /* ── PDF VIEWER ───────────────────────────────────────── */
    #viewer-wrap {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      background: var(--canvas-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 0;
      gap: 12px;
      position: relative;
    }

    .pdf-page-wrap {
      position: relative;
      box-shadow: 0 4px 32px rgba(0,0,0,.6);
    }

    .pdf-page-wrap canvas { display: block; }

    /* text layer for search highlights */
    .textLayer {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      line-height: 1;
    }
    .textLayer span {
      color: transparent;
      position: absolute;
      white-space: pre;
      transform-origin: 0% 0%;
      pointer-events: none;
    }
    /* Wenn click-modus aktiv: Spans klickbar machen */
    body.click-mode .textLayer span {
      pointer-events: all;
      cursor: crosshair;
    }
    /* Highlights werden als Overlay-Divs gezeichnet, nicht auf Spans */
    .highlight-overlay {
      position: absolute;
      pointer-events: none;
      border-radius: 3px;
      background: rgba(255, 107, 53, 0.35);   /* orange = weitere Treffer */
      outline: 1px solid rgba(255, 107, 53, 0.6);
    }
    .highlight-overlay.current {
      background: rgba(0, 229, 160, 0.75);    /* grün = aktiver Treffer */
      outline: 1px solid var(--accent);
    }

    /* page number label */
    .page-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      text-align: center;
      letter-spacing: .08em;
    }

    /* scroll-to indicator */
    #scroll-indicator {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--accent);
      color: #000;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      padding: 6px 12px;
      border-radius: 4px;
      opacity: 0;
      transition: opacity .4s;
      pointer-events: none;
      z-index: 100;
    }
    #scroll-indicator.show { opacity: 1; }

    /* debug panel */
    #debug-panel {
      position: fixed;
      bottom: 60px;
      right: 20px;
      background: #0a0c0e;
      border: 1px solid #ff6b35;
      border-radius: 4px;
      padding: 8px 12px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: #ff6b35;
      z-index: 200;
      min-width: 260px;
      display: none;
    }
    #debug-panel.visible { display: block; }
    #debug-panel .db-row { margin: 2px 0; }
    #debug-panel .db-label { color: var(--muted); }
    #debug-panel .db-val   { color: #fff; }
    #debug-toggle {
      position: fixed;
      bottom: 20px;
      right: 160px;
      background: #1a1c1e;
      border: 1px solid #ff6b35;
      color: #ff6b35;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      z-index: 200;
    }
  </style>

  <!-- Reaper web remote script -->
  <script src="main.js"></script>

  <script>
  // ═══════════════════════════════════════════════════════════
  // STATE
  // ═══════════════════════════════════════════════════════════
  let pageOffset   = 0;
  let markerTag    = "#S";
  let projectPDF   = "";

  let last_transport_state = -1;
  let last_time_str        = 0;

  // mode flags
  let modeMarker = true;   // follow markers → page jump
  let modeItem   = false;  // follow items   → text search

  // PDF.js state
  let pdfDoc       = null;
  let pdfUrl       = null;
  let renderedPages = {};
  let totalPages   = 0;
  let currentPage  = 1;
  let searchMatches = [];
  let currentMatchIndex = 0;
  let zoomFactor   = 1.0;   // Zoom-Multiplikator, 1.0 = Standardgröße

  // item state – kommt direkt aus ExtState via ReaScript
  let activeItemName  = "";
  let activeItemStart = 0;     // Startzeit des aktiven Items (vom Lua-Script)
  let markerIsActive  = false;
  let itemFilter      = "";
  let itemFilterList  = [];
  let syncActive      = true;
  let clickMode       = false;
  let itemLookup      = {};

  // debounce for item search
  let searchDebounceTimer = null;
  let lastSearchTerm = "";

  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ═══════════════════════════════════════════════════════════
  // REAPER POLLING
  // ═══════════════════════════════════════════════════════════
  function wwr_onreply(results) {
    if (!syncActive) return; // Sync pausiert → alles ignorieren

    const ar = results.split("\n");
    const markerArray = [];
    markerIsActive = false;

    for (let i = 0; i < ar.length; i++) {
      const tok = ar[i].split("\t");
      if (tok.length === 0) continue;

      switch (tok[0]) {

        case "TRANSPORT":
          if (tok.length > 4) {
            last_transport_state = parseInt(tok[1]);
            last_time_str = parseFloat(tok[2]);
            updateTransportDisplay();
          }
          break;

        case "MARKER":
          if (tok.length > 3) {
            const name = tok[1];
            dbSet("letzter Marker-Name (roh)", `"${name}"`);
            dbSet("markerTag (aktuell)", `"${markerTag}"`);
            dbSet("startsWith-Check", `"${name}".startsWith("${markerTag}") = ${name.startsWith(markerTag)}`);
            if (name.startsWith(markerTag)) {
              const entry = [...tok];
              entry[2] = name.substring(markerTag.length).trim();
              markerArray.push(entry);
            }
          }
          break;

        case "PROJEXTSTATE":
          if (tok[2] === "offset")     { pageOffset = (tok[3] === "NaN" || tok[3] == null) ? 0 : Number(tok[3]); }
          if (tok[2] === "markerTag")  { markerTag  = tok[3] || "#S"; }
          if (tok[2] === "PDF")        { handleProjectPDF(tok[3]); }
          updateParamDisplay();
          break;

        case "EXTSTATE":
          if (tok[1] === "pagesWebRC" && tok[2] === "activeItem") {
            activeItemName = tok[3] || "";
            dbSet("ExtState activeItem empfangen", `"${activeItemName}"`);
          }
          if (tok[1] === "pagesWebRC" && tok[2] === "activeItemStart") {
            activeItemStart = parseFloat(tok[3]) || 0;
            dbSet("activeItemStart", activeItemStart);
          }
          if (tok[1] === "pagesWebRC" && tok[2] === "itemLookup") {
            try {
              // Format: [{name, start}, ...] – Array mit allen Items inkl. Duplikate
              const arr = JSON.parse(tok[3] || "[]");
              itemLookup = arr; // Array behalten
            } catch(e) { itemLookup = []; }
          }
          break;
      }
    }

    // Seite hat Vorrang beim SPRINGEN – Marker steuert die Seite
    if (modeMarker) processMarkers(markerArray);

    // Item-Highlights laufen IMMER wenn Item-Modus aktiv –
    // auch wenn Marker aktiv ist (nur der Seitensprung wird dann blockiert)
    if (modeItem) processItems();
  }

  // ═══════════════════════════════════════════════════════════
  // MARKER MODE
  // ═══════════════════════════════════════════════════════════
  function processMarkers(markerArray) {
    if (markerArray.length === 0) return;

    const arr = [
      ["MARKER", "Anfang", 0,    0,     0],
      ...markerArray,
      ["MARKER", "Ende",   9999, 10000, 0]
    ];

    for (let i = 0; i < arr.length - 1; i++) {
      const left  = parseFloat(arr[i][3]);
      const right = parseFloat(arr[i+1][3]);

      if (left <= last_time_str && last_time_str <= right) {
        const targetPage = Number(arr[i][2]) + pageOffset;
        if (targetPage > 0) {
          markerIsActive = true;  // Seite ist aktiv → Item wird ignoriert
          if (targetPage !== currentPage) {
            goToPage(targetPage, `Marker → Seite ${targetPage}`);
          }
        }
        break;
      }
    }
  }

  // ═══════════════════════════════════════════════════════════
  // ITEM MODE
  // ═══════════════════════════════════════════════════════════
  function processItems() {
    let term = activeItemName ? activeItemName.trim() : "";

    // Mehrere Filter (komma-getrennt): Item muss mindestens einen enthalten
    if (term && itemFilterList.length > 0) {
      const termLower = term.toLowerCase();
      const passes = itemFilterList.some(f => termLower.includes(f.toLowerCase()));
      if (!passes) {
        term = "";
        dbSet("Item gefiltert", `„${activeItemName}" passt keinem Filter`);
      }
    }

    dbSet("modeItem aktiv", "ja");
    dbSet("markerIsActive", markerIsActive ? "ja" : "nein");
    dbSet("activeItemName (ExtState)", activeItemName || "(leer)");
    dbSet("itemFilter", itemFilter || "(kein Filter)");
    dbSet("lastSearchTerm", lastSearchTerm || "(leer)");

    if (term && term !== lastSearchTerm) {
      lastSearchTerm = term;
      clearSearchDebounce();

      // Welches Vorkommen dieses Namens ist das aktive?
      // Alle Items mit gleichem Namen nach Startzeit sortieren,
      // dann Index des aktuell aktiven ermitteln
      const matchIndex = getItemOccurrenceIndex(term);
      dbSet("Vorkommen-Index", matchIndex);

      searchDebounceTimer = setTimeout(() => searchInPDF(term, matchIndex), 200);
      setStatus(`Item: „${term}" (Vorkommen ${matchIndex + 1})`, "item");
    } else if (!term && lastSearchTerm !== "") {
      lastSearchTerm = "";
      clearAllHighlights();
      setStatus(itemFilterList.length > 0 ? `Kein passendes Item (Filter: ${itemFilter})` : "Kein aktives Item", "idle");
    }
  }

  // Ermittelt den Index des aktiven Items unter allen gleichnamigen Items im Lookup.
  // itemLookup ist jetzt ein Array: [{name, start}, ...] – sortiert nach Startzeit.
  // Das aktive Item hat die Startzeit activeItemStart (direkt vom Lua-Script).
  function getItemOccurrenceIndex(term) {
    const termLower = term.toLowerCase();

    // Alle Einträge mit gleichem Namen aus Array, nach Startzeit sortiert
    const sameNameItems = itemLookup
      .filter(e => e.name.toLowerCase() === termLower)
      .sort((a, b) => a.start - b.start);

    if (sameNameItems.length === 0) return 0;

    // Nächsten Treffer zu activeItemStart finden
    let bestIndex = 0;
    let bestDiff  = Infinity;
    for (let i = 0; i < sameNameItems.length; i++) {
      const diff = Math.abs(sameNameItems[i].start - activeItemStart);
      if (diff < bestDiff) {
        bestDiff  = diff;
        bestIndex = i;
      }
    }

    dbSet("activeItemStart", activeItemStart.toFixed(3));
    dbSet("sameNameItems", sameNameItems.map(x => x.start.toFixed(1)).join(', '));
    dbSet("→ gewählter Index", bestIndex);

    return bestIndex;
  }

  function clearSearchDebounce() {
    if (searchDebounceTimer) { clearTimeout(searchDebounceTimer); searchDebounceTimer = null; }
  }

  // ═══════════════════════════════════════════════════════════
  // PDF.js – LOAD
  // ═══════════════════════════════════════════════════════════
  async function loadPDF(url) {
    if (!url) return;
    if (url === pdfUrl) return; // ← verhindert unnötiges Neu-Laden!

    pdfUrl = url;
    renderedPages = {};
    searchMatches = [];
    currentPage = 1;

    setStatus("PDF wird geladen…", "idle");

    try {
      pdfDoc = await pdfjsLib.getDocument(url).promise;
      totalPages = pdfDoc.numPages;
      setStatus(`PDF geladen – ${totalPages} Seiten`, "idle");
      await renderAllPages();
    } catch (e) {
      setStatus("PDF-Ladefehler: " + e.message, "idle");
      console.error(e);
    }
  }

  async function renderAllPages() {
    const container = document.getElementById('viewer-wrap');
    container.innerHTML = ''; // alten Inhalt entfernen

    for (let p = 1; p <= totalPages; p++) {
      const page = await pdfDoc.getPage(p);
      const scale = calcScale(page);
      const viewport = page.getViewport({ scale });

      // wrapper
      const wrap = document.createElement('div');
      wrap.className = 'pdf-page-wrap';
      wrap.id = `page-wrap-${p}`;
      wrap.style.width  = viewport.width + 'px';
      wrap.style.height = viewport.height + 'px';

      // canvas
      const canvas = document.createElement('canvas');
      canvas.width  = viewport.width;
      canvas.height = viewport.height;

      // text layer div
      const textLayerDiv = document.createElement('div');
      textLayerDiv.className = 'textLayer';
      textLayerDiv.id = `text-layer-${p}`;
      textLayerDiv.style.width  = viewport.width + 'px';
      textLayerDiv.style.height = viewport.height + 'px';

      wrap.appendChild(canvas);
      wrap.appendChild(textLayerDiv);

      // page label
      const label = document.createElement('div');
      label.className = 'page-label';
      label.textContent = `— ${p} / ${totalPages} —`;

      container.appendChild(wrap);
      container.appendChild(label);

      // render canvas
      await page.render({ canvasContext: canvas.getContext('2d'), viewport }).promise;

      // build text layer
      const textContent = await page.getTextContent();
      renderedPages[p] = { viewport, textContent };
      buildTextLayer(p, textLayerDiv, textContent, viewport);
    }
  }

  function calcScale(page) {
    const viewport = page.getViewport({ scale: 1 });
    const availW = window.innerWidth - 40;
    const baseScale = Math.min(availW / viewport.width, 1.8);
    return baseScale * zoomFactor;
  }

  function buildTextLayer(pageNum, div, textContent, viewport) {
    div.innerHTML = '';
    for (const item of textContent.items) {
      const span = document.createElement('span');
      span.textContent = item.str;

      const tx = pdfjsLib.Util.transform(viewport.transform, item.transform);
      const angle = Math.atan2(tx[1], tx[0]);
      const scaleX = Math.sqrt(tx[0]*tx[0] + tx[1]*tx[1]);
      const scaleY = Math.sqrt(tx[2]*tx[2] + tx[3]*tx[3]);
      const fontH = Math.sqrt(tx[2]*tx[2] + tx[3]*tx[3]);

      span.style.left      = tx[4] + 'px';
      span.style.top       = (tx[5] - fontH) + 'px';
      span.style.fontSize  = fontH + 'px';
      span.style.transform = angle ? `rotate(${angle}rad)` : '';
      span.style.scaleX    = scaleX / fontH;
      div.appendChild(span);
    }
  }

  // ═══════════════════════════════════════════════════════════
  // SEARCH & HIGHLIGHT
  // Zeichnet einen einzigen Overlay-Div pro Treffergruppe –
  // kein Span-Splitting, kein überlappender Rand
  // ═══════════════════════════════════════════════════════════
  async function searchInPDF(term, occurrenceIndex = 0) {
    clearAllHighlights();
    if (!pdfDoc || !term) return;

    const termLower = term.toLowerCase().trim();
    searchMatches   = [];
    currentMatchIndex = 0;

    dbSet("Suche nach", `"${termLower}" (Vorkommen ${occurrenceIndex + 1})`);

    for (let p = 1; p <= totalPages; p++) {
      const data = renderedPages[p];
      if (!data) continue;

      const { textContent } = data;
      const textLayerDiv = document.getElementById(`text-layer-${p}`);
      const pageWrap     = document.getElementById(`page-wrap-${p}`);
      if (!textLayerDiv || !pageWrap) continue;

      const spans = Array.from(textLayerDiv.querySelectorAll('span'));
      const lines = buildLines(textContent.items, spans);
      const pageGroups = [];

      for (const line of lines) {
        const lineText = line.map(s => s.text).join('').toLowerCase();
        if (!lineText.includes(termLower)) continue;

        const matchSpans = findMatchingSpans(line, termLower);
        if (matchSpans.length === 0) continue;

        const box = getGroupBoundingBox(matchSpans, pageWrap);
        if (!box) continue;

        const overlay = document.createElement('div');
        overlay.className = 'highlight-overlay';
        overlay.style.left   = box.left   + 'px';
        overlay.style.top    = box.top    + 'px';
        overlay.style.width  = box.width  + 'px';
        overlay.style.height = box.height + 'px';
        pageWrap.appendChild(overlay);

        pageGroups.push({ spans: matchSpans, overlay });
      }

      if (pageGroups.length > 0) {
        searchMatches.push({ pageNum: p, groups: pageGroups });
      }
    }

    // Alle Treffer flach als Liste
    const allGroups = searchMatches.flatMap(m => m.groups);
    const total = allGroups.length;
    document.getElementById('match-count').textContent =
      total > 0 ? `${total} Treffer` : 'kein Treffer';
    dbSet("Treffer gesamt", total);

    if (total > 0) {
      // n-ten Treffer (occurrenceIndex) als aktiven markieren, Rest als weitere
      const targetIndex  = Math.min(occurrenceIndex, total - 1);
      const targetGroup  = allGroups[targetIndex];
      targetGroup.overlay.classList.add('current');

      scrollToOverlay(targetGroup.overlay, `Item → „${term}" (${targetIndex + 1}/${total})`);
    } else {
      setStatus(`„${term}" nicht gefunden`, "item");
    }
  }

  // Berechnet die umschließende Box aller Spans relativ zum page-wrap
  function getGroupBoundingBox(spans, pageWrap) {
    const wrapRect = pageWrap.getBoundingClientRect();
    let minLeft = Infinity, minTop = Infinity, maxRight = -Infinity, maxBottom = -Infinity;

    for (const span of spans) {
      const r = span.getBoundingClientRect();
      if (r.width === 0 && r.height === 0) continue;
      minLeft   = Math.min(minLeft,   r.left   - wrapRect.left);
      minTop    = Math.min(minTop,    r.top    - wrapRect.top);
      maxRight  = Math.max(maxRight,  r.right  - wrapRect.left);
      maxBottom = Math.max(maxBottom, r.bottom - wrapRect.top);
    }
    if (minLeft === Infinity) return null;
    return { left: minLeft - 1, top: minTop - 1, width: maxRight - minLeft + 2, height: maxBottom - minTop + 2 };
  }

  // Gibt nur die Spans zurück die den Suchbegriff in der Zeile abdecken.
  // Funktioniert auch wenn der Begriff über mehrere Spans verteilt ist
  // (z.B. "OTon" + "-" + "10" als drei separate PDF-Elemente).
  function findMatchingSpans(line, termLower) {
    // Kumulativen Zeilentext mit Positions-Map aufbauen
    let cumText = "";
    const segMap = []; // { start, end, span }

    for (const seg of line) {
      const start = cumText.length;
      cumText += seg.text.toLowerCase();
      segMap.push({ start, end: cumText.length, span: seg.span });
    }

    const result = [];
    let pos = 0;
    while (pos < cumText.length) {
      const idx = cumText.indexOf(termLower, pos);
      if (idx === -1) break;
      const termEnd = idx + termLower.length;

      // Alle Spans die [idx, termEnd) überlappen
      for (const seg of segMap) {
        if (seg.span && seg.end > idx && seg.start < termEnd) {
          if (!result.includes(seg.span)) result.push(seg.span);
        }
      }
      pos = idx + 1;
    }
    return result;
  }

  // Gruppiert textContent-Items nach Y-Koordinate zu Zeilen
  // Gibt [{text, span}] pro Zeile zurück
  function buildLines(items, spans) {
    const YTOL = 3; // px Toleranz für "gleiche Zeile"
    const lines = []; // Array von Arrays

    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (!item.str || item.str.trim() === '') continue;

      const span = spans[i] || null;
      const y    = item.transform ? Math.round(item.transform[5]) : 0;

      // Suche passende Zeile
      let found = false;
      for (const line of lines) {
        if (Math.abs(line.y - y) <= YTOL) {
          line.segs.push({ text: item.str, span });
          found = true;
          break;
        }
      }
      if (!found) {
        lines.push({ y, segs: [{ text: item.str, span }] });
      }
    }

    // Zeilen von oben nach unten sortieren, Segs von links nach rechts
    lines.sort((a, b) => b.y - a.y);
    return lines.map(l => l.segs);
  }

  async function setZoom(val) {
    zoomFactor = parseFloat(val);
    document.getElementById('zoom-label').textContent = Math.round(zoomFactor * 100) + '%';
    if (!pdfDoc) return;
    const savedPage = currentPage;
    await renderAllPages();
    if (lastSearchTerm) {
      await searchInPDF(lastSearchTerm);
    } else {
      scrollToPage(savedPage, null);
    }
  }

  function clearAllHighlights() {
    document.querySelectorAll('.highlight-overlay').forEach(el => el.remove());
    document.getElementById('match-count').textContent = '';
    searchMatches = [];
  }

  // ═══════════════════════════════════════════════════════════
  // NAVIGATION
  // ═══════════════════════════════════════════════════════════
  function goToPage(num, reason) {
    const clamped = Math.max(1, Math.min(totalPages || 9999, num));
    if (clamped === currentPage && reason) return;
    currentPage = clamped;
    scrollToPage(clamped, reason);
  }

  function scrollToPage(pageNum, reason) {
    const wrap = document.getElementById(`page-wrap-${pageNum}`);
    if (!wrap) return;
    wrap.scrollIntoView({ behavior: 'instant', block: 'start' });
    showScrollIndicator(reason || `Seite ${pageNum}`);
    if (reason) setStatus(reason, "marker");
  }

  // Scrollt zum Overlay nur wenn er nicht bereits im sichtbaren Bereich liegt
  function scrollToOverlay(overlay, reason) {
    if (!overlay) return;
    const viewerWrap = document.getElementById('viewer-wrap');
    const rect       = overlay.getBoundingClientRect();
    const wrapRect   = viewerWrap.getBoundingClientRect();

    const isVisible = rect.top >= wrapRect.top && rect.bottom <= wrapRect.bottom;

    if (!isVisible) {
      const scrollTarget = viewerWrap.scrollTop + (rect.top - wrapRect.top) - 20;
      viewerWrap.scrollTo({ top: scrollTarget, behavior: 'instant' });
      showScrollIndicator(reason || "Item gefunden");
    }
    setStatus(reason || "Item gefunden", "item");
  }

  // scrollToSpan bleibt als Fallback
  function scrollToSpan(span, reason) {
    if (!span) return;
    const viewerWrap = document.getElementById('viewer-wrap');
    const spanRect   = span.getBoundingClientRect();
    const wrapRect   = viewerWrap.getBoundingClientRect();
    const scrollTarget = viewerWrap.scrollTop + (spanRect.top - wrapRect.top) - 20;
    viewerWrap.scrollTo({ top: scrollTarget, behavior: 'instant' });
    showScrollIndicator(reason || "Item gefunden");
    setStatus(reason || "Item gefunden", "item");
  }

  function showScrollIndicator(text) {
    const el = document.getElementById('scroll-indicator');
    el.textContent = text;
    el.classList.add('show');
    clearTimeout(el._timer);
    el._timer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  // ═══════════════════════════════════════════════════════════
  // PDF SOURCE HANDLING – kein Reload wenn Datei gleich bleibt
  // ═══════════════════════════════════════════════════════════
  let lastProjectPDFName = "";

  function handleProjectPDF(name) {
    if (!name || name === lastProjectPDFName) return;
    lastProjectPDFName = name;

    // Direkt als URL an PDF.js übergeben – Reaper's Webserver liefert
    // alle Dateien aus dem www-Ordner, also ist "pdf/datei.pdf" eine
    // gültige relative URL die der Browser auflösen kann.
    pdfUrl = null; // force reload
    loadPDF(name);
  }

  function getPDF() {
    const file = document.getElementById("inputPDF").files[0];
    if (!file) return;

    // Relativen Pfad mit Unterordner speichern
    const relativePath = "pdf/" + file.name;
    wwr_req("SET/PROJEXTSTATE/pagesWebRC/PDF/" + encodeURIComponent(relativePath));
    wwr_req("GET/PROJEXTSTATE/pagesWebRC/PDF");

    // Lokal direkt aus FileReader laden (funktioniert auch ohne Webserver-Pfad)
    const fr = new FileReader();
    fr.onload = () => {
      pdfUrl = null;
      lastProjectPDFName = relativePath;
      loadPDF(fr.result);
    };
    fr.readAsDataURL(file);
  }

  // ═══════════════════════════════════════════════════════════
  // UI HELPERS
  // ═══════════════════════════════════════════════════════════
  function updateTransportDisplay() {
    const states = { 0:"STOP", 1:"PLAY", 2:"PAUSE", 5:"REC", 6:"REC-PAUSE" };
    const stateStr = states[last_transport_state] || "–";
    const timeStr  = convertSecondsToHHMMSS(last_time_str);
    const el = document.getElementById('transport-state');
    el.textContent = stateStr;
    el.className = 'state';
    if (last_transport_state === 1)                                      el.classList.add('playing');
    else if (last_transport_state === 2 || last_transport_state === 6)   el.classList.add('paused');
    else if (last_transport_state === 5)                                  el.classList.add('rec');
    document.getElementById('transport-time').textContent = timeStr;
  }

  function convertSecondsToHHMMSS(s) {
    const pad = n => String(Math.floor(n)).padStart(2,'0');
    return `${pad(s/3600)}:${pad((s%3600)/60)}:${pad(s%60)}`;
  }

  function updateParamDisplay() {
    document.getElementById('pageOffsetVal').textContent  = pageOffset;
    document.getElementById('markerTagVal').textContent   = markerTag;
    document.getElementById('itemFilterVal').textContent  = itemFilter || "–";
  }

  function prompt_itemTag() {} // nicht mehr benötigt

  function prompt_itemFilter() {
    const v = prompt("Item-Filter eingeben – mehrere Begriffe komma-getrennt:\nz.B. OTon, Atmo\nLeer lassen = kein Filter", itemFilter);
    if (v !== null) {
      itemFilter = v.trim();
      itemFilterList = itemFilter
        ? itemFilter.split(',').map(s => s.trim()).filter(s => s.length > 0)
        : [];
      document.getElementById('itemFilterVal').textContent = itemFilter || "–";
      lastSearchTerm = ""; // Suche neu auslösen
    }
  }

  function setStatus(msg, type) {
    document.getElementById('status-msg').textContent = msg;
    const b = document.getElementById('mode-badge');
    if      (type === "marker") { b.textContent = "MARKER"; b.className = "badge badge-marker"; }
    else if (type === "item")   { b.textContent = "ITEM";   b.className = "badge badge-item"; }
    else                        { b.textContent = "IDLE";   b.className = "badge badge-inactive"; }
  }

  function prompt_pageOffset() {
    const v = prompt("Page Offset eingeben:", pageOffset);
    if (v !== null) {
      wwr_req("SET/PROJEXTSTATE/pagesWebRC/offset/" + encodeURIComponent(v));
      wwr_req("GET/PROJEXTSTATE/pagesWebRC/offset");
      pageOffset = Number(v);
      updateParamDisplay();
    }
  }

  function prompt_markerTag() {
    const v = prompt("Marker-Tag eingeben:", markerTag);
    if (v !== null) {
      wwr_req("SET/PROJEXTSTATE/pagesWebRC/markerTag/" + encodeURIComponent(v));
      wwr_req("GET/PROJEXTSTATE/pagesWebRC/markerTag");
      markerTag = v || "#S";
      updateParamDisplay();
    }
  }

  // Command ID des ItemWatcher-Scripts in Reaper
  const ITEMWATCHER_ACTION = "_RS6d5cde61b3f919e841b26adb43d1dd5d9c1a7db8";

  // Reaper-Action direkt per HTTP triggern (wwr_req funktioniert nicht zuverlässig für ACTION)
  function triggerReaperAction(actionID) {
    const url = "/_/" + encodeURIComponent(actionID);
    fetch(url)
      .then(r => {
        dbSet("ACTION HTTP-Status", r.status + " " + r.statusText);
        setStatus("Script-Start gesendet (Status " + r.status + ")", "item");
      })
      .catch(e => {
        dbSet("ACTION Fehler", e.message);
        setStatus("Script-Start fehlgeschlagen: " + e.message, "idle");
      });
  }

  function toggleMode(id) {
    const pill = document.getElementById(id);
    const cb   = pill.querySelector('input');
    cb.checked = !cb.checked;
    pill.classList.toggle('active', cb.checked);

    if (id === 'toggle-marker') {
      modeMarker = cb.checked;
      if (!modeMarker) setStatus("Marker-Modus deaktiviert", "idle");

    } else {
      modeItem = cb.checked;

      if (modeItem) {
        // Flag setzen damit Script weiß dass es laufen soll
        wwr_req("SET/EXTSTATE/pagesWebRC/itemWatcherRun/1");
        // Script starten – zwei Varianten parallel versuchen
        triggerReaperAction(ITEMWATCHER_ACTION);
        wwr_req("ACTION/" + ITEMWATCHER_ACTION);
        dbSet("Script-Start versucht", ITEMWATCHER_ACTION);
      } else {
        // Script stoppen via Flag
        wwr_req("SET/EXTSTATE/pagesWebRC/itemWatcherRun/0");
        clearAllHighlights();
        lastSearchTerm = "";
        activeItemName = "";
        setStatus("Item-Modus deaktiviert – Script gestoppt", "idle");
      }
    }
  }

  // ═══════════════════════════════════════════════════════════
  // START
  // ═══════════════════════════════════════════════════════════
  // ═══════════════════════════════════════════════════════════
  // DEBUG
  // ═══════════════════════════════════════════════════════════
  const dbState = {};
  function dbSet(label, val) {
    dbState[label] = val;
    const panel = document.getElementById('debug-panel');
    if (!panel || !panel.classList.contains('visible')) return;
    panel.innerHTML = Object.entries(dbState)
      .map(([k,v]) => `<div class="db-row"><span class="db-label">${k}:</span> <span class="db-val">${v}</span></div>`)
      .join('');
  }
  function toggleDebug() {
    const p = document.getElementById('debug-panel');
    p.classList.toggle('visible');
  }

  function toggleSync() {
    syncActive = !syncActive;
    const btn = document.getElementById('sync-toggle');
    btn.classList.toggle('active', syncActive);
    btn.querySelector('.pill-dot').style.background = syncActive ? 'var(--accent)' : 'var(--border)';
    btn.querySelector('.pill-text').textContent = syncActive ? 'Sync AN' : 'Sync AUS';
    if (!syncActive) {
      clearAllHighlights();
      lastSearchTerm = "";
      setStatus("Synchronisation pausiert", "idle");
    } else {
      setStatus("Synchronisation aktiv", "idle");
    }
  }

  function toggleClickMode() {
    clickMode = !clickMode;
    const btn = document.getElementById('click-toggle');
    btn.classList.toggle('active', clickMode);
    btn.querySelector('.pill-dot').style.background = clickMode ? 'var(--accent2)' : 'var(--border)';
    document.body.classList.toggle('click-mode', clickMode);
    setStatus(clickMode ? "Klick-Modus aktiv – auf Text klicken um in Reaper zu springen" : "Klick-Modus deaktiviert", "idle");
  }

  // Klick auf Text-Layer → Reaper-Playhead setzen
  function handleTextClick(e) {
    if (!clickMode) return;
    const span = e.target.closest('span');
    if (!span) {
      dbSet("Klick", "kein Span getroffen");
      return;
    }

    // Ganzen Zeilentext rekonstruieren: alle Spans mit gleicher Y-Position
    const textLayer = span.closest('.textLayer');
    const clickedLine = getLineText(span, textLayer);
    dbSet("Klick – Zeilentext", `"${clickedLine}"`);
    dbSet("itemLookup Einträge", Array.isArray(itemLookup) ? itemLookup.length : Object.keys(itemLookup).length);

    if (!clickedLine) return;

    // Lookup: längsten Namen suchen der in der Zeile vorkommt,
    // dann den Eintrag dessen Startzeit am nächsten zur aktuellen Position liegt
    const sortedItems = [...itemLookup].sort((a, b) => b.name.length - a.name.length);
    let foundPos  = null;
    let foundName = null;

    // Erst besten Namen finden
    let bestName = null;
    for (const entry of sortedItems) {
      if (clickedLine.toLowerCase().includes(entry.name.toLowerCase())) {
        bestName = entry.name.toLowerCase();
        break;
      }
    }

    if (bestName) {
      // Unter allen gleichnamigen den nehmen der am nächsten zur aktuellen Playposition liegt
      const candidates = itemLookup
        .filter(e => e.name.toLowerCase() === bestName)
        .sort((a, b) => Math.abs(a.start - last_time_str) - Math.abs(b.start - last_time_str));
      if (candidates.length > 0) {
        foundPos  = candidates[0].start;
        foundName = candidates[0].name;
      }
    }

    dbSet("Lookup-Treffer", foundName ? `„${foundName}" @ ${foundPos.toFixed(2)}s` : "keiner");

    if (foundPos !== null) {
      const cmd = "SET/POS/" + foundPos;
      wwr_req(cmd);
      fetch("/_/" + cmd)
        .then(r => dbSet("fetch SET/POS Status", r.status))
        .catch(err => dbSet("fetch SET/POS Fehler", err.message));

      setStatus(`Reaper → „${foundName}" (${foundPos.toFixed(2)}s)`, "item");
      showScrollIndicator(`→ ${foundName}`);
    } else {
      setStatus(`Kein Reaper-Item für „${clickedLine}" gefunden`, "idle");
    }
  }

  // Liest alle Spans der gleichen Zeile (±3px Y-Toleranz) und gibt den zusammengesetzten Text zurück
  function getLineText(clickedSpan, textLayer) {
    if (!textLayer) return clickedSpan.textContent.trim();

    const allSpans  = Array.from(textLayer.querySelectorAll('span'));
    const clickRect = clickedSpan.getBoundingClientRect();
    const clickY    = (clickRect.top + clickRect.bottom) / 2;

    const lineSpans = allSpans.filter(s => {
      const r = s.getBoundingClientRect();
      const midY = (r.top + r.bottom) / 2;
      return Math.abs(midY - clickY) < 5;
    });

    // Von links nach rechts sortieren
    lineSpans.sort((a, b) => a.getBoundingClientRect().left - b.getBoundingClientRect().left);
    return lineSpans.map(s => s.textContent).join('').trim();
  }

  wwr_start();
  wwr_req_recur("TRANSPORT;MARKER", 150);
  wwr_req("GET/PROJEXTSTATE/pagesWebRC/offset;GET/PROJEXTSTATE/pagesWebRC/markerTag;GET/PROJEXTSTATE/pagesWebRC/PDF");
  wwr_req_recur("GET/EXTSTATE/pagesWebRC/activeItem;GET/EXTSTATE/pagesWebRC/activeItemStart;GET/EXTSTATE/pagesWebRC/itemLookup", 150);
  </script>
</head>

<body>

  <!-- ── TOP BAR ─────────────────────────────────────────── -->
  <div id="topbar">

    <div class="logo">PDF PAGETURNER v2</div>

    <div class="separator"></div>

    <div id="transport-display">
      <span class="state" id="transport-state">–</span>
      <span class="time"  id="transport-time">00:00:00</span>
    </div>

    <div class="separator"></div>

    <!-- Mode toggles -->
    <div class="mode-group">
      <span class="mode-label">Modi:</span>

      <div class="toggle-pill active" id="toggle-marker" onclick="toggleMode('toggle-marker')">
        <input type="checkbox" checked>
        <div class="pill-dot"></div>
        <span class="pill-text">Marker → Seite</span>
      </div>

      <div class="toggle-pill" id="toggle-item" onclick="toggleMode('toggle-item')">
        <input type="checkbox">
        <div class="pill-dot"></div>
        <span class="pill-text">Item → Textsuche</span>
      </div>

      <div class="toggle-pill active" id="sync-toggle" onclick="toggleSync()" style="border-color:var(--accent)">
        <input type="checkbox" checked>
        <div class="pill-dot" style="background:var(--accent)"></div>
        <span class="pill-text">Sync AN</span>
      </div>

      <div class="toggle-pill" id="click-toggle" onclick="toggleClickMode()">
        <input type="checkbox">
        <div class="pill-dot"></div>
        <span class="pill-text">Klick → Reaper</span>
      </div>
    </div>

    <div class="separator"></div>

    <!-- Params -->
    <div class="param-field">
      <label>Seiten-Tag:</label>
      <span class="val" id="markerTagVal" onclick="prompt_markerTag()">#S</span>
    </div>

    <div class="param-field">
      <label>Item-Filter:</label>
      <span class="val" id="itemFilterVal" onclick="prompt_itemFilter()" style="color:var(--accent2)">–</span>
    </div>

    <div class="param-field">
      <label>Offset:</label>
      <span class="val" id="pageOffsetVal" onclick="prompt_pageOffset()">0</span>
    </div>

    <div class="separator"></div>

    <!-- Zoom -->
    <div class="param-field">
      <label>Zoom:</label>
      <input type="range" id="zoom-slider"
        min="0.5" max="3.0" step="0.1" value="1.0"
        oninput="setZoom(this.value)"
        style="width:80px; accent-color:var(--accent); cursor:pointer; vertical-align:middle;">
      <span id="zoom-label" style="font-family:'Share Tech Mono',monospace; color:var(--accent); font-size:11px; min-width:36px;">100%</span>
    </div>

    <div class="separator"></div>

    <!-- File -->
    <input id="inputPDF" type="file" accept=".pdf" onchange="getPDF()">

  </div>

  <!-- ── STATUS BAR ──────────────────────────────────────── -->
  <div id="statusbar">
    <span class="badge badge-inactive" id="mode-badge">IDLE</span>
    <span id="status-msg">Kein PDF geladen</span>
    <span id="match-count"></span>
  </div>

  <!-- ── PDF VIEWER ──────────────────────────────────────── -->
  <div id="viewer-wrap" onclick="handleTextClick(event)"></div>

  <!-- ── SCROLL INDICATOR ────────────────────────────────── -->
  <div id="scroll-indicator"></div>

  <!-- ── DEBUG PANEL ─────────────────────────────────────── -->
  <button id="debug-toggle" onclick="toggleDebug()">DEBUG</button>
  <div id="debug-panel"></div>

</body>
</html>
